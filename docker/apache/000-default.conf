<VirtualHost *:80>
    # Point document root directly at public/ — this is the correct production
    # setup. All pages live in public/, so Apache serves them directly without
    # any router.php indirection. Relative header() redirects work natively.
    DocumentRoot /var/www/html/public
    ServerName localhost

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Deny direct HTTP access to sensitive backend directories
    # (these are outside the document root anyway, but belt-and-suspenders)
    <DirectoryMatch "^/var/www/html/(config|database|migration|vendor|\.git|\.agent|\.claude)">
        Require all denied
    </DirectoryMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
